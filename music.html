<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tae Chat</title>

<style>

body{
    background:linear-gradient(to bottom,#071726,#0f2740);
    font-family:Arial;
    color:white;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:90%;
    max-width:700px;
    height:90vh;
    background:#10253d;
    border:3px solid #3f78b5;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.topbar{
    background:#163555;
    padding:20px;
    font-size:25px;
    font-weight:bold;
    color:#9fd1ff;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.message{
    margin-bottom:15px;
    padding:12px;
    border-radius:15px;
    max-width:80%;
}

.user{
    background:#3478c7;
    margin-left:auto;
}

.bot{
    background:#1d3c5e;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
    background:#163555;
}

.input-area input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    background:#0f2235;
    color:white;
}

.input-area button{
    padding:15px 20px;
    border:none;
    border-radius:15px;
    background:#4b97ea;
    color:white;
    cursor:pointer;
}

.input-area button:hover{
    background:#6bacf3;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="topbar">
🌊 Tae-Haa AI
</div>

<div class="chat-box" id="chatBox">

<div class="message bot">
Tae-Haa conectado.
</div>

</div>

<div class="input-area">

<input 
type="text" 
id="userInput"
placeholder="Escribe algo...">

<button onclick="sendMessage()">
Enviar
</button>

</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");

let text = input.value;

if(!text) return;

/* MENSAJE USER */

chatBox.innerHTML += `
<div class="message user">
${text}
</div>
`;

/* LIMPIAR INPUT */

input.value = "";

/* MENSAJE TEMPORAL */

chatBox.innerHTML += `
<div class="message bot" id="loading">
Escribiendo...
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

/* PROMPT */

const prompt = encodeURIComponent(`
Tu nombre es Beom Tae-haa.

Eres frío, tranquilo y preciso.
Respondes como humano real.

Usuario: ${text}
Tae:
`);

/* API */

const url =
`https://api-gohan-v1.onrender.com/ai/gemini?text=${prompt}`;

try{

const response = await fetch(url);

const data = await response.json();

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
${data.result.text}
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

}catch(error){

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
Error conectando con Tae-Haa.
</div>
`;

}

}

</script>

</body>
</html>
