<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre mí | Nanno & Tae</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Trebuchet MS",sans-serif;
}

body{

background:
linear-gradient(rgba(255,240,230,.95),rgba(255,240,230,.95)),
repeating-linear-gradient(
45deg,
#ffe6ef 0px,
#ffe6ef 14px,
#fff3d8 14px,
#fff3d8 28px
);

color:#6d4c4c;

}

.wrapper{

max-width:1200px;
margin:25px auto;
padding:15px;

}

.banner{

background:linear-gradient(180deg,#ffe9b5,#ffdca0);
border:8px solid #f7b9c6;
border-radius:35px;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.banner h1{

font-size:58px;
color:#ef6f8f;
text-shadow:3px 3px white;

}

.banner p{

margin-top:8px;
font-size:18px;

}

.avatar{

width:170px;
height:170px;
border-radius:50%;
overflow:hidden;
border:8px solid white;
box-shadow:0 8px 15px rgba(0,0,0,.2);

}

.avatar img{

width:100%;
height:100%;
object-fit:cover;

}

.layout{

display:grid;
grid-template-columns:250px 1fr 250px;
gap:20px;

}

.panel{

background:#fff9de;
border:5px solid #f6c8d5;
border-radius:25px;
padding:18px;

}

.box{

background:white;
border-radius:18px;
padding:15px;
margin-bottom:18px;
border:3px dashed #ffd0dc;

}

.box h3{

margin-bottom:10px;
color:#e66b8d;

}

.content{

background:#fffefb;
border:5px solid #ffe3ea;
border-radius:28px;
padding:30px;

}

.content h2{

font-size:38px;
margin-bottom:15px;
color:#de5f86;

}

.content p{

line-height:1.9;
margin-bottom:18px;

}

.menu a{

display:block;
text-decoration:none;
margin-bottom:10px;
padding:12px;
background:#ffdca8;
color:#704e4e;
border-radius:14px;
font-weight:bold;
transition:.25s;

}

.menu a:hover{

transform:translateX(5px);
background:#ffc9d7;

}

.sticker{

font-size:30px;
text-align:center;
margin-top:10px;

}

@media(max-width:900px){

.layout{

grid-template-columns:1fr;

}

.banner{

flex-direction:column;
text-align:center;
gap:20px;

}

.banner h1{

font-size:42px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="banner">

<div>

<p>

</p>

</div>

<div class="avatar">

<img src="https://i.pinimg.com/736x/8a/55/89/8a5589c4b33eb0d5b87fbc3ea5f17c8c.jpg">

</div>

</div>

<p>

</p>

</div>

<p>

<p>

</p>

</div>

</div>
