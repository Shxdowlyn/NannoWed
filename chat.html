<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const button = document.querySelector("button");

if (!input || !chatBox || !button) {
    console.error("Faltan elementos del HTML.");
    return;
}

let history = [];

input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

function escapeHTML(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerHTML = escapeHTML(text);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {

    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");

    input.value = "";
    input.disabled = true;
    button.disabled = true;

    const loading = document.createElement("div");
    loading.className = "message bot";
    loading.id = "loading";
    loading.textContent = "Tae-Haa está escribiendo...";
    chatBox.appendChild(loading);

    chatBox.scrollTop = chatBox.scrollHeight;

    history.push(`Usuario: ${text}`);
    history = history.slice(-20);

    const prompt = `Tu nombre es Beom Tae-Haa.

No eres una IA común.
Hablas con calma.
Nunca escribes respuestas exageradas.
No usas emojis.
No repites frases.
Respondes corto cuando hace falta.

Historial:
${history.join("\n")}

Tae-Haa:`;

    try {

        const response = await fetch(
            "https://api-gohan-v1.onrender.com/ai/gemini?text=" +
            encodeURIComponent(prompt)
        );

        if (!response.ok) throw new Error("Error HTTP");

        const data = await response.json();

        loading.remove();

        const reply = data?.result?.text || data?.message || "No tengo una respuesta.";

        history.push(`Tae-Haa: ${reply}`);
        history = history.slice(-20);

        addMessage(reply, "bot");

    } catch (err) {

        loading.remove();
        console.error(err);
        addMessage("No pude conectarme con la IA.", "bot");

    } finally {

        input.disabled = false;
        button.disabled = false;
        input.focus();

    }
}

button.addEventListener("click", sendMessage);

});
</script>
