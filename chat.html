<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const button = document.querySelector("button");

let history = [];

input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        sendMessage();
    }
});

function escapeHTML(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function addMessage(text, type) {
    chatBox.innerHTML += `
        <div class="message ${type}">
            ${escapeHTML(text)}
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");

    input.value = "";
    input.disabled = true;
    button.disabled = true;

    chatBox.innerHTML += `
        <div class="message bot" id="loading">
            Tae-Haa está escribiendo...
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    history.push(`Usuario: ${text}`);

    // Mantener solo los últimos 20 mensajes
    if (history.length > 20) {
        history = history.slice(-20);
    }

    const prompt = `
Tu nombre es Beom Tae-Haa.
No eres una IA común.
Hablas con calma.
Nunca escribes respuestas exageradas.
No usas emojis.
No repites frases.
Respondes corto cuando hace falta.

Historial:
${history.join("\n")}

Tae-Haa:
`;

    try {
        const response = await fetch(
            "https://api-gohan-v1.onrender.com/ai/gemini?text=" +
            encodeURIComponent(prompt)
        );

        if (!response.ok) {
            throw new Error("Error en la API");
        }

        const data = await response.json();

        document.getElementById("loading")?.remove();

        const reply = data?.result?.text || data?.message || "No tengo una respuesta.";

        history.push(`Tae-Haa: ${reply}`);

        if (history.length > 20) {
            history = history.slice(-20);
        }

        addMessage(reply, "bot");

    } catch (err) {
        document.getElementById("loading")?.remove();
        addMessage("No pude conectarme con la IA.", "bot");
        console.error(err);
    }

    input.disabled = false;
    button.disabled = false;
    input.focus();
}
</script>
