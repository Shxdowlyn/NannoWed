<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tae-Haa Chat</title>

<style>
/* Aquí va TODO el CSS */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(180deg,#dff5ff,#bfe7ff,#9ddcff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:800px;
    height:90vh;
    background:#fafdff;
    border:3px solid #a8d8ff;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,90,140,.2);
}

.header{
    background:linear-gradient(90deg,#8bd3ff,#6ab9ff);
    color:white;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.header small{
    display:block;
    font-size:14px;
    margin-top:5px;
}

#chatBox{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:
    radial-gradient(circle at top,#ffffff88,transparent 40%),
    linear-gradient(#eefbff,#d7f2ff);
}

.message{
    max-width:80%;
    padding:12px 16px;
    border-radius:18px;
    margin-bottom:12px;
    line-height:1.5;
    word-wrap:break-word;
}

.user{
    margin-left:auto;
    background:#7cc9ff;
    color:white;
    border-bottom-right-radius:6px;
}

.bot{
    background:white;
    color:#355;
    border:2px solid #cbe9ff;
    border-bottom-left-radius:6px;
}

.inputArea{
    display:flex;
    gap:10px;
    padding:15px;
    background:white;
    border-top:2px solid #d5ecff;
}

#userInput{
    flex:1;
    padding:14px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#eef8ff;
    font-size:15px;
}

button{
    border:none;
    background:#73c8ff;
    color:white;
    padding:14px 22px;
    border-radius:15px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#58b8ff;
}

.footer{
    text-align:center;
    font-size:12px;
    color:#6f93aa;
    padding:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
🌊 Beom Tae-Haa
<small>Mar, calma y código.</small>
</div>

<div id="chatBox">
<div class="message bot">
Hola. Soy Tae-Haa.<br><br>
¿En qué puedo ayudarte?
</div>
</div>

<div class="inputArea">
<input
id="userInput"
type="text"
placeholder="Escribe un mensaje..."
autocomplete="off">
<button id="sendBtn">Enviar</button>
</div>

<div class="footer">
made with sueño, música y océano
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const input=document.getElementById("userInput");
const chatBox=document.getElementById("chatBox");
const button=document.getElementById("sendBtn");

let history=[];

function escapeHTML(text){
return String(text)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=escapeHTML(text).replace(/\n/g,"<br>");

chatBox.appendChild(div);

chatBox.scrollTop=chatBox.scrollHeight;

}

async function sendMessage(){

const text=input.value.trim();

if(!text)return;

addMessage(text,"user");

input.value="";
input.disabled=true;
button.disabled=true;

const loading=document.createElement("div");
loading.className="message bot";
loading.id="loading";
loading.textContent="Tae-Haa está escribiendo...";
chatBox.appendChild(loading);

chatBox.scrollTop=chatBox.scrollHeight;

history.push("Usuario: "+text);
history=history.slice(-20);

const prompt=`Tu nombre es Beom Tae-Haa.

Hablas tranquilo.

No usas emojis.

Respondes de forma natural.

Historial:

${history.join("\n")}

Tae-Haa:`;

try{

const response=await fetch(
"https://api-gohan-v1.onrender.com/ai/gemini?text="+
encodeURIComponent(prompt)
);

if(!response.ok)throw new Error();

const data=await response.json();

loading.remove();

const reply=
data?.result?.text||
data?.message||
"No tengo una respuesta.";

history.push("Tae-Haa: "+reply);
history=history.slice(-20);

addMessage(reply,"bot");

}catch(err){

loading.remove();

addMessage("No pude conectarme con la IA.","bot");

console.error(err);

}

input.disabled=false;
button.disabled=false;
input.focus();

}

button.addEventListener("click",sendMessage);

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
sendMessage();
}
});

});

</script>

</body>
</html>
