<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tae Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(to bottom,#071726,#0f2740);
    font-family:Arial;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.chat-container{
    width:100%;
    max-width:750px;
    height:95vh;
    background:#10253d;
    border:3px solid #3f78b5;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.topbar{
    background:#163555;
    padding:20px;
    font-size:25px;
    font-weight:bold;
    color:#9fd1ff;
    border-bottom:2px solid #2f5f91;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message{
    margin-bottom:15px;
    padding:14px;
    border-radius:18px;
    max-width:80%;
    line-height:1.5;
    animation:fade 0.2s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.user{
    background:#3478c7;
    margin-left:auto;
}

.bot{
    background:#1d3c5e;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
    background:#163555;
}

.input-area input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    background:#0f2235;
    color:white;
    font-size:16px;
}

.input-area input::placeholder{
    color:#8fb6db;
}

.input-area button{
    padding:15px 22px;
    border:none;
    border-radius:15px;
    background:#4b97ea;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.input-area button:hover{
    background:#6bacf3;
}

.back-button{
    position:absolute;
    top:20px;
    left:20px;
}

.back-button a{
    text-decoration:none;
}

.back-button button{
    padding:10px 18px;
    border:none;
    border-radius:15px;
    background:#3478c7;
    color:white;
    cursor:pointer;
}

.back-button button:hover{
    background:#5fa0ee;
}

</style>
</head>

<body>

<div class="back-button">
<a href="index.html">
<button>⬅ Inicio</button>
</a>
</div>

<div class="chat-container">

<div class="topbar">
🌊 Tae-Haa AI
</div>

<div class="chat-box" id="chatBox">

<div class="message bot">
Tae-Haa conectado.
</div>

</div>

<div class="input-area">

<input 
type="text" 
id="userInput"
placeholder="Escribe algo...">

<button onclick="sendMessage()">
Enviar
</button>

</div>

</div>

<script>

const input =
document.getElementById("userInput");

input.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

async function sendMessage(){

const chatBox =
document.getElementById("chatBox");

let text = input.value.trim();

if(!text) return;

chatBox.innerHTML += `
<div class="message user">
${text}
</div>
`;

input.value = "";

chatBox.innerHTML += `
<div class="message bot" id="loading">
Tae-Haa está escribiendo...
</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

const prompt = encodeURIComponent(`
Tu nombre es Beom Tae-haa.

Eres tranquilo, frío y preciso.
Hablas como humano real.

Usuario: ${text}
Tae:
`);

const url =
`https://api-gohan-v1.onrender.com/ai/gemini?text=${prompt}`;

try{

const response = await fetch(url);

const data = await response.json();

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
${data.result.text}
</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

}catch(error){

document.getElementById("loading").remove();

chatBox.innerHTML += `
<div class="message bot">
No pude conectarme ahora.
</div>
`;

}

}

</script>

</body>
</html>
